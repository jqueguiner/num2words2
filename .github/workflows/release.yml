name: Build and Release

on:
  push:
    branches:
      - master
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - master
      - main

jobs:
  build:
    name: Build Distribution
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0  # For setuptools_scm

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build setuptools wheel setuptools_scm

    - name: Build distribution
      run: |
        python -m build
        ls -la dist/

    - name: Check build
      run: |
        pip install twine
        twine check dist/*

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: python-package-distributions
        path: dist/

  test-package:
    name: Test Built Package
    needs: build
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        name: python-package-distributions
        path: dist/

    - name: Test installation
      run: |
        pip install dist/*.whl
        python -c "import num2words2; print('Version:', getattr(num2words2, '__version__', 'not set'))"
        python -c "from num2words2 import num2words; print('English 42:', num2words(42, lang='en'))"
        python -c "from num2words2 import num2words; print('Assamese 42:', num2words(42, lang='as'))"

  release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build, test-package]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        name: python-package-distributions
        path: dist/

    - uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Full history needed to find previous tag

    - name: Generate Release Notes
      id: release_notes
      env:
        GH_TOKEN: ${{ github.token }}
        TAG: ${{ github.ref_name }}
      run: |
        # Find the previous tag (excluding the current one) to scope the changelog.
        PREV_TAG=$(git tag --sort=-creatordate | grep -v "^${TAG}$" | head -1 || true)
        echo "Current tag: ${TAG}"
        echo "Previous tag: ${PREV_TAG:-<none>}"

        # Build the supported language list from the package itself.
        python -m pip install --quiet -e .
        LANG_COUNT=$(python -c "import num2words2; print(len(num2words2.CONVERTER_CLASSES))")
        LANG_CODES=$(python -c "import num2words2; print(', '.join(sorted(num2words2.CONVERTER_CLASSES)))")

        {
          echo "## What's Changed"
          echo
          if [ -n "${PREV_TAG}" ]; then
            git log --pretty=format:'- %s (%h)' "${PREV_TAG}..${TAG}" | grep -v "^$" || echo "_No commits since ${PREV_TAG}._"
            echo
            echo
            echo "**Full Changelog**: https://github.com/${GITHUB_REPOSITORY}/compare/${PREV_TAG}...${TAG}"
          else
            git log --pretty=format:'- %s (%h)' "${TAG}" | head -50
          fi

          # Surface upstream contributor credits — extract any
          # "savoirfairelinux/num2words#NNN by @user" mentions from commit
          # bodies so original authors are visible in the release notes.
          if [ -n "${PREV_TAG}" ]; then
            range="${PREV_TAG}..${TAG}"
          else
            range="${TAG}"
          fi
          credits=$(git log --pretty=format:'%B' "${range}" \
            | grep -oE 'savoirfairelinux/num2words#[0-9]+ by @[A-Za-z0-9_-]+' \
            | sort -u || true)
          if [ -n "${credits}" ]; then
            echo
            echo "## Credits"
            echo
            echo "Thank you to the upstream contributors whose work this release ports:"
            echo
            while IFS= read -r line; do
              upstream_pr=$(echo "$line" | grep -oE '#[0-9]+' | tr -d '#')
              author=$(echo "$line" | grep -oE '@[A-Za-z0-9_-]+')
              echo "- ${author} — [savoirfairelinux/num2words#${upstream_pr}](https://github.com/savoirfairelinux/num2words/pull/${upstream_pr})"
            done <<<"${credits}"
          fi

          echo
          echo "## Languages Supported"
          echo
          echo "${LANG_COUNT} language codes registered:"
          echo
          echo "\`\`\`"
          echo "${LANG_CODES}" | fold -s -w 80
          echo "\`\`\`"

          echo
          echo "## Installation"
          echo
          echo '```bash'
          echo "pip install num2words2==${TAG#v}"
          echo '```'

          echo
          echo "## Usage"
          echo
          echo '```python'
          echo 'from num2words2 import num2words'
          echo "print(num2words(42, lang='en'))"
          echo '```'
        } > release_notes.md

        echo "--- release notes ---"
        cat release_notes.md

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        body_path: release_notes.md
        files: dist/*
        draft: false
        prerelease: false

  publish-pypi:
    name: Publish to PyPI
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build, test-package, release]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/num2words2/
    permissions:
      id-token: write

    steps:
    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        name: python-package-distributions
        path: dist/

    - name: Check package versions
      run: |
        ls -la dist/
        for file in dist/*; do
          echo "Package: $file"
          if [[ $file == *"+g"* ]]; then
            echo "ERROR: Local version identifier found in package name!"
            echo "This usually means no proper git tag exists."
            echo "Please create a release tag first: git tag -a v1.0.0 -m 'Release v1.0.0'"
            exit 1
          fi
        done

    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        skip-existing: true
