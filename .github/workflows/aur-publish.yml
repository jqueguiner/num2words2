name: Publish to AUR

# Auto-bumps the python-num2words2 AUR package whenever a v* tag is pushed.
#
# Prerequisite (one-time):
#   1. The AUR package python-num2words2 must already exist (see
#      packaging/aur/python-num2words2/README.md for the initial publish).
#   2. Add the maintainer's SSH private key to GitHub Secrets as AUR_SSH_KEY
#      (the matching public key must be on the AUR account).

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish-aur:
    name: Push PKGBUILD bump to AUR
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Wait for PyPI release to land
        env:
          TAG: ${{ github.ref_name }}
        run: |
          # Strip leading 'v' from the tag.
          version="${TAG#v}"
          echo "Waiting for num2words2 ${version} on PyPI…"
          for i in $(seq 1 30); do
            if curl -fsSL "https://pypi.org/pypi/num2words2/${version}/json" >/dev/null; then
              echo "PyPI has ${version}"
              break
            fi
            echo "  attempt ${i}: not yet, sleeping 20s"
            sleep 20
          done

      - name: Render PKGBUILD + .SRCINFO for new version
        env:
          TAG: ${{ github.ref_name }}
        run: |
          version="${TAG#v}"
          sha=$(curl -fsSL "https://pypi.org/pypi/num2words2/${version}/json" \
                | python3 -c 'import json,sys; d=json.load(sys.stdin); \
                  print(next(u["digests"]["sha256"] for u in d["urls"] if u["packagetype"]=="sdist"))')
          echo "version=${version}  sha256=${sha}"

          mkdir -p out
          sed -e "s/^pkgver=.*/pkgver=${version}/" \
              -e "s/^pkgrel=.*/pkgrel=1/" \
              -e "s/^sha256sums=.*/sha256sums=('${sha}')/" \
              packaging/aur/python-num2words2/PKGBUILD > out/PKGBUILD

          # Re-render .SRCINFO via sed on the existing template instead of
          # makepkg in a container. Avoids the docker permission failure on
          # hosted runners and keeps the transform deterministic.
          sed -e "s/^\tpkgver = .*/\tpkgver = ${version}/" \
              -e "s|^\tsource = .*|\tsource = https://files.pythonhosted.org/packages/source/n/num2words2/num2words2-${version}.tar.gz|" \
              -e "s/^\tsha256sums = .*/\tsha256sums = ${sha}/" \
              packaging/aur/python-num2words2/.SRCINFO > out/.SRCINFO

      - name: Push to AUR
        env:
          AUR_USERNAME: ${{ secrets.AUR_USERNAME }}
          AUR_EMAIL: ${{ secrets.AUR_EMAIL }}
          AUR_SSH_KEY: ${{ secrets.AUR_SSH_KEY }}
          TAG: ${{ github.ref_name }}
        run: |
          # Direct git commands — replaces KSXGitHub/github-actions-deploy-aur
          # which has a 'bash --command: invalid option' bug.
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          # OpenSSH requires a trailing newline and chokes on CRLF.
          # printf '%s\n' + tr -d '\r' normalises both regardless of how
          # the secret was stored.
          printf '%s\n' "$AUR_SSH_KEY" | tr -d '\r' > ~/.ssh/aur_key
          chmod 600 ~/.ssh/aur_key
          ssh-keyscan -t rsa,ecdsa,ed25519 aur.archlinux.org >> ~/.ssh/known_hosts 2>/dev/null
          export GIT_SSH_COMMAND="ssh -i ~/.ssh/aur_key -o StrictHostKeyChecking=yes"

          git clone ssh://aur@aur.archlinux.org/python-num2words2.git aur-clone
          cp out/PKGBUILD out/.SRCINFO aur-clone/
          cd aur-clone
          git config user.name  "$AUR_USERNAME"
          git config user.email "$AUR_EMAIL"
          git add PKGBUILD .SRCINFO
          if git diff --cached --quiet; then
            echo "AUR PKGBUILD already at $TAG, nothing to push"
          else
            git commit -m "Bump to $TAG"
            git push origin master
          fi
